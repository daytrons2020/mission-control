<!-- Mission Control Dashboard - With Real OpenClaw Integration -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control v2 - Live Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(15, 15, 20, 0.6);
      --glass-bg-light: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-purple: #8b5cf6;
      --accent-cyan: #00f5ff;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0e;
      color: #fff;
      min-height: 100vh;
    }
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 245, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    /* Connection Status */
    .connection-status {
      position: fixed;
      top: 70px;
      right: 24px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .connection-status.online {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }
    .connection-status.offline {
      background: rgba(239, 68, 68, 0.2);
      color: var(--accent-red);
      border: 1px solid var(--accent-red);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .online .status-dot { background: var(--accent-green); }
    .offline .status-dot { background: var(--accent-red); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Navigation */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(15, 15, 20, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link {
      padding: 10px 16px;
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--glass-bg-light);
      color: #fff;
    }
    .nav-link.active {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
    }
    
    /* Main Content */
    .main-content {
      padding: 80px 24px 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
    }
    .last-updated {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      background: linear-gradient(135deg, var(--accent-purple), #ec4899);
      color: white;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }
    .health-score {
      font-size: 48px;
      font-weight: 700;
    }
    .health-score.good { color: var(--accent-green); }
    .health-score.warning { color: var(--accent-yellow); }
    .health-score.bad { color: var(--accent-red); }
    
    /* Agent Cards */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .agent-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }
    .agent-card:hover {
      border-color: var(--accent-purple);
    }
    .agent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .agent-info {
      flex: 1;
    }
    .agent-name {
      font-weight: 600;
      font-size: 16px;
    }
    .agent-role {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .agent-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .agent-status.online {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }
    .agent-status.busy {
      background: rgba(245, 158, 11, 0.2);
      color: var(--accent-yellow);
    }
    .agent-status.offline {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
    }
    
    /* Cron Jobs */
    .cron-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cron-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
    }
    .cron-status {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .cron-status.success { background: var(--accent-green); }
    .cron-status.error { background: var(--accent-red); }
    .cron-status.pending { background: var(--accent-yellow); }
    .cron-info {
      flex: 1;
    }
    .cron-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .cron-schedule {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .cron-last-run {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .agents-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <!-- Connection Status -->
  <div class="connection-status offline" id="connection-status">
    <span class="status-dot"></span>
    <span id="connection-text">Connecting to OpenClaw...</span>
  </div>
  
  <!-- Navigation -->
  <nav class="nav-bar">
    <div class="nav-brand">
      <span>🎯</span>
      <span>Mission Control v2</span>
    </div>
    <div class="nav-links">
      <button class="nav-link active" onclick="mcApp.switchTab('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="mcApp.switchTab('agents')">Agents</button>
      <button class="nav-link" onclick="mcApp.switchTab('cron')">Cron Jobs</button>
      <a href="memory.html" class="nav-link">Memory</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="header">
      <div>
        <h1 id="page-title">Dashboard</h1>
        <div class="last-updated" id="last-updated">Loading...</div>
      </div>
      <button class="btn" id="refresh-btn" onclick="mcApp.refreshData()">🔄 Refresh</button>
    </div>

    <!-- Dashboard Tab -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-agents">-</div>
          <div class="stat-label">Active Agents</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">-</div>
          <div class="stat-label">Active Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-cron">-</div>
          <div class="stat-label">Cron Jobs</div>
        </div>
        <div class="stat-card">
          <div class="health-score" id="health-score">-</div>
          <div class="stat-label">Health Score</div>
        </div>
      </div>
    </div>

    <!-- Agents Tab -->
    <div class="tab-content" id="tab-agents">
      <div class="agents-grid" id="agents-grid">
        <p style="color: rgba(255,255,255,0.5);">Loading agents...</p>
      </div>
    </div>

    <!-- Cron Jobs Tab -->
    <div class="tab-content" id="tab-cron">
      <div class="cron-list" id="cron-list">
        <p style="color: rgba(255,255,255,0.5);">Loading cron jobs...</p>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="services/openclawService.js"></script>
  <script>
    // Main Application with Real OpenClaw Integration
    class MissionControlApp {
      constructor() {
        this.currentTab = 'dashboard';
        this.openClawData = null;
        this.init();
      }
      
      async init() {
        await this.loadData();
        // Auto-refresh every 30 seconds
        setInterval(() => this.loadData(), 30000);
      }
      
      async loadData() {
        try {
          // Try to get real data from OpenClaw
          const data = await window.openClawService.getDashboardData();
          this.openClawData = data;
          this.renderDashboard(data);
          this.updateConnectionStatus(data.connected);
        } catch (error) {
          console.error('Error loading OpenClaw data:', error);
          this.updateConnectionStatus(false);
          this.renderFallback();
        }
      }
      
      updateConnectionStatus(connected) {
        const statusEl = document.getElementById('connection-status');
        const textEl = document.getElementById('connection-text');
        
        if (connected) {
          statusEl.className = 'connection-status online';
          textEl.textContent = 'OpenClaw Connected';
        } else {
          statusEl.className = 'connection-status offline';
          textEl.textContent = 'OpenClaw Offline';
        }
      }
      
      switchTab(tabName) {
        document.querySelectorAll('.nav-link').forEach(link => {
          link.classList.remove('active');
        });
        event.target.classList.add('active');
        
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.remove('active');
        });
        document.getElementById(`tab-${tabName}`).classList.add('active');
        
        const titles = {
          dashboard: 'Dashboard',
          agents: 'Agents',
          cron: 'Cron Jobs'
        };
        document.getElementById('page-title').textContent = titles[tabName];
        
        this.currentTab = tabName;
      }
      
      async refreshData() {
        const btn = document.getElementById('refresh-btn');
        btn.disabled = true;
        btn.textContent = '🔄 Refreshing...';
        
        await this.loadData();
        
        btn.textContent = '✅ Refreshed';
        setTimeout(() => {
          btn.textContent = '🔄 Refresh';
          btn.disabled = false;
        }, 1500);
      }
      
      renderDashboard(data) {
        // Update stats
        document.getElementById('stat-agents').textContent = data.agents?.length || 0;
        document.getElementById('stat-sessions').textContent = data.activeSessions || 0;
        document.getElementById('stat-cron').textContent = data.cronJobs?.length || 0;
        
        // Health score
        const healthEl = document.getElementById('health-score');
        healthEl.textContent = data.healthScore || 0;
        healthEl.className = 'health-score ' + (data.healthScore > 80 ? 'good' : data.healthScore > 50 ? 'warning' : 'bad');
        
        // Update timestamp
        document.getElementById('last-updated').textContent = 
          `Last updated: ${new Date().toLocaleString()}`;
        
        // Render agents
        this.renderAgents(data.agents || []);
        
        // Render cron jobs
        this.renderCronJobs(data.cronJobs || []);
      }
      
      renderAgents(agents) {
        const grid = document.getElementById('agents-grid');
        if (!agents.length) {
          grid.innerHTML = '<p style="color: rgba(255,255,255,0.5);">No active agents</p>';
          return;
        }
        
        grid.innerHTML = agents.map(agent => `
          <div class="agent-card">
            <div class="agent-header">
              <div class="agent-avatar">🤖</div>
              <div class="agent-info">
                <div class="agent-name">${agent.name}</div>
                <div class="agent-role">${agent.sessions?.length || 0} active sessions</div>
              </div>
            </div>
            <span class="agent-status ${agent.status}">
              <span class="status-dot"></span>
              ${agent.status}
            </span>
          </div>
        `).join('');
      }
      
      renderCronJobs(jobs) {
        const list = document.getElementById('cron-list');
        if (!jobs.length) {
          list.innerHTML = '<p style="color: rgba(255,255,255,0.5);">No cron jobs found</p>';
          return;
        }
        
        list.innerHTML = jobs.map(job => `
          <div class="cron-item">
            <div class="cron-status ${job.lastRunStatus || 'pending'}"></div>
            <div class="cron-info">
              <div class="cron-name">${job.name}</div>
              <div class="cron-schedule">${job.schedule}</div>
            </div>
            <div class="cron-last-run">${job.lastRunAt ? new Date(job.lastRunAt).toLocaleString() : 'Never'}</div>
          </div>
        `).join('');
      }
      
      renderFallback() {
        // Show sample data when OpenClaw is offline
        this.renderDashboard({
          agents: [
            { name: 'Nano (Coordinator)', status: 'online', sessions: [] },
            { name: 'Frontend Developer', status: 'online', sessions: [] },
            { name: 'Backend Developer', status: 'busy', sessions: [] },
            { name: 'AI Engineer', status: 'online', sessions: [] }
          ],
          activeSessions: 4,
          cronJobs: [
            { name: 'Morning Brief', schedule: 'Daily 6:00 AM', lastRunStatus: 'success' },
            { name: 'Afternoon Check', schedule: 'Daily 2:00 PM', lastRunStatus: 'success' },
            { name: 'Evening Work Block', schedule: 'Daily 8:00 PM', lastRunStatus: 'pending' }
          ],
          healthScore: 85,
          connected: false
        });
      }
    }
    
    // Initialize
    window.mcApp = new MissionControlApp();
  </script>
</body>
</html>
