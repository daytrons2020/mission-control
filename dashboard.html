<!-- Mission Control Dashboard - Complete with All Tabs -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control v2 - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(15, 15, 20, 0.6);
      --glass-bg-light: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-purple: #8b5cf6;
      --accent-cyan: #00f5ff;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0e;
      color: #fff;
      min-height: 100vh;
    }
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 245, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    /* Navigation - FIXED: All 5 tabs visible */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(15, 15, 20, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link {
      padding: 10px 16px;
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--glass-bg-light);
      color: #fff;
    }
    .nav-link.active {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
    }
    
    /* Main Content */
    .main-content {
      padding: 80px 24px 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
    }
    .last-updated {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      background: linear-gradient(135deg, var(--accent-purple), #ec4899);
      color: white;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }
    
    /* Project Cards */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .project-card {
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
    }
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .project-name {
      font-weight: 600;
      font-size: 16px;
    }
    .project-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-active { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
    .status-planning { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); }
    .progress-bar {
      height: 8px;
      background: var(--glass-bg-light);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    /* Task List */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
    }
    .task-content { flex: 1; }
    .task-title { font-weight: 500; margin-bottom: 4px; }
    .task-priority {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .priority-high { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
    .priority-medium { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); }
    .priority-low { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
    
    /* Calendar */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .calendar-day {
      aspect-ratio: 1;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .calendar-day.today {
      background: rgba(139, 92, 246, 0.2);
      border-color: var(--accent-purple);
    }
    .day-number { font-weight: 600; font-size: 14px; }
    .day-name { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    
    /* Team */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .team-card {
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .team-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }
    .team-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .team-role { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 12px; }
    .team-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .team-status.online {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Agents Section */
    .agents-section {
      margin-top: 32px;
    }
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .agent-card {
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 8px;
    }
    .agent-name { font-weight: 600; font-size: 14px; }
    .agent-status {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <!-- Navigation - FIXED: All 5 tabs -->
  <nav class="nav-bar">
    <div class="nav-brand">
      <span>🎯</span>
      <span>Mission Control v2</span>
    </div>
    <div class="nav-links">
      <button class="nav-link active" onclick="mcApp.switchTab('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="mcApp.switchTab('tasks')">Tasks</button>
      <button class="nav-link" onclick="mcApp.switchTab('calendar')">Calendar</button>
      <button class="nav-link" onclick="mcApp.switchTab('team')">Team</button>
      <a class="nav-link" href="memory.html">Memory</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="header">
      <div>
        <h1 id="page-title">Dashboard</h1>
        <div class="last-updated" id="last-updated">Loading...</div>
      </div>
      <button class="btn" id="refresh-btn" onclick="mcApp.refreshData()">🔄 Refresh</button>
    </div>

    <!-- Dashboard Tab -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">7</div>
          <div class="stat-label">Total Projects</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-progress">35%</div>
          <div class="stat-label">Avg Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-high">4</div>
          <div class="stat-label">High Priority</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-agents">9</div>
          <div class="stat-label">Agents</div>
        </div>
      </div>

      <!-- Projects -->
      <div style="background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 600;">Active Projects</h2>
          <span style="color: rgba(255,255,255,0.5); font-size: 14px;">From TASKS.md</span>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
      </div>

      <!-- Agents Section -->
      <div class="agents-section" style="background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 600;">Agent Status</h2>
          <span style="color: rgba(255,255,255,0.5); font-size: 14px;">Live from OpenClaw</span>
        </div>
        <div class="agents-grid" id="agents-grid"></div>
      </div>
    </div>

    <!-- Tasks Tab -->
    <div class="tab-content" id="tab-tasks">
      <div style="background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 600;">Active Tasks</h2>
          <button class="btn" onclick="alert('Add task feature coming soon')">+ Add Task</button>
        </div>
        <div class="task-list" id="task-list"></div>
      </div>
    </div>

    <!-- Calendar Tab -->
    <div class="tab-content" id="tab-calendar">
      <div style="background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 600;">Calendar</h2>
          <span style="color: rgba(255,255,255,0.5); font-size: 14px;">March 2026</span>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
    </div>

    <!-- Team Tab -->
    <div class="tab-content" id="tab-team">
      <div style="background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 600;">Team Members</h2>
          <span style="color: rgba(255,255,255,0.5); font-size: 14px;">9 Specialist Agents</span>
        </div>
        <div class="team-grid" id="team-grid"></div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="api/github.js"></script>
  <script src="services/dataService.js"></script>
  <script src="services/openclawService.js"></script>
  <script>
    // Main Application - FIXED: All tabs working
    class MissionControlApp {
      constructor() {
        this.currentTab = 'dashboard';
        this.init();
      }
      
      async init() {
        await this.loadData();
        this.loadTasks();
        this.loadCalendar();
        this.loadTeam();
        this.loadAgents();
      }
      
      async loadData() {
        try {
          const data = await window.mcDataService.getDashboardData();
          this.renderProjects(data.projects || []);
          document.getElementById('last-updated').textContent = 
            `Last updated: ${new Date().toLocaleString()}`;
        } catch (error) {
          console.error('Error loading data:', error);
          this.renderFallback();
        }
      }
      
      // FIXED: Proper tab switching
      switchTab(tabName) {
        // Update nav active state
        document.querySelectorAll('.nav-link').forEach(link => {
          link.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // Hide all tab content
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.remove('active');
        });
        
        // Show selected tab
        document.getElementById(`tab-${tabName}`).classList.add('active');
        
        // Update page title
        const titles = {
          dashboard: 'Dashboard',
          tasks: 'Tasks',
          calendar: 'Calendar',
          team: 'Team'
        };
        document.getElementById('page-title').textContent = titles[tabName];
        
        this.currentTab = tabName;
      }
      
      // FIXED: Working refresh button
      async refreshData() {
        const btn = document.getElementById('refresh-btn');
        btn.disabled = true;
        btn.textContent = '🔄 Refreshing...';
        
        try {
          if (window.mcDataService.clearCache) {
            window.mcDataService.clearCache();
          }
          
          await this.loadData();
          await this.loadAgents();
          
          btn.textContent = '✅ Refreshed';
          setTimeout(() => {
            btn.textContent = '🔄 Refresh';
            btn.disabled = false;
          }, 1500);
        } catch (error) {
          btn.textContent = '❌ Failed';
          setTimeout(() => {
            btn.textContent = '🔄 Refresh';
            btn.disabled = false;
          }, 2000);
        }
      }
      
      renderProjects(projects) {
        const grid = document.getElementById('projects-grid');
        const defaultProjects = [
          { name: 'Trading System', status: 'active', progress: 35 },
          { name: 'RT Scheduling', status: 'active', progress: 35 },
          { name: 'Respiratory Education', status: 'active', progress: 45 },
          { name: 'Respiratory Tools', status: 'active', progress: 25 },
          { name: 'Reselling Business', status: 'planning', progress: 15 },
          { name: 'YouTube Empire', status: 'planning', progress: 10 },
          { name: 'Kids App', status: 'planning', progress: 10 }
        ];
        
        const displayProjects = projects.length ? projects : defaultProjects;
        
        grid.innerHTML = displayProjects.map(p => `
          <div class="project-card">
            <div class="project-header">
              <span class="project-name">${p.name}</span>
              <span class="project-status status-${p.status}">${p.status}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${p.progress}%"></div>
            </div>
            <div style="font-size: 12px; color: rgba(255,255,255,0.6); text-align: right;">
              ${p.progress}% complete
            </div>
          </div>
        `).join('');
      }
      
      async loadAgents() {
        const grid = document.getElementById('agents-grid');
        
        // Try to get real data from OpenClaw
        try {
          if (window.openClawService) {
            const data = await window.openClawService.getDashboardData();
            if (data.agents && data.agents.length) {
              grid.innerHTML = data.agents.map(agent => `
                <div class="agent-card">
                  <div class="agent-avatar">🤖</div>
                  <div class="agent-name">${agent.name}</div>
                  <div class="agent-status">${agent.status}</div>
                </div>
              `).join('');
              return;
            }
          }
        } catch (e) {
          console.log('OpenClaw not available, using fallback');
        }
        
        // Fallback to static data
        const agents = [
          { name: 'Nano', status: 'online', emoji: '🔬' },
          { name: 'Frontend Dev', status: 'online', emoji: '🎨' },
          { name: 'Backend Dev', status: 'online', emoji: '⚙️' },
          { name: 'AI Engineer', status: 'busy', emoji: '🤖' },
          { name: 'Database Eng', status: 'online', emoji: '🗄️' },
          { name: 'Integration Spec', status: 'online', emoji: '🔌' },
          { name: 'Researcher', status: 'online', emoji: '🔍' },
          { name: 'Reviewer', status: 'online', emoji: '👁️' },
          { name: 'Coder', status: 'online', emoji: '💻' }
        ];
        
        grid.innerHTML = agents.map(a => `
          <div class="agent-card">
            <div class="agent-avatar">${a.emoji}</div>
            <div class="agent-name">${a.name}</div>
            <div class="agent-status">${a.status}</div>
          </div>
        `).join('');
      }
      
      loadTasks() {
        const tasks = [
          { title: 'Test Trading System with real data', priority: 'high', status: 'in-progress' },
          { title: 'Deploy backend server', priority: 'high', status: 'todo' },
          { title: 'Continue RT Scheduling UI', priority: 'high', status: 'in-progress' },
          { title: 'Create Discord slash commands', priority: 'medium', status: 'done' },
          { title: 'Build mobile navigation', priority: 'medium', status: 'done' },
          { title: 'Add Memory Archive screen', priority: 'medium', status: 'done' }
        ];
        
        const list = document.getElementById('task-list');
        list.innerHTML = tasks.map(t => `
          <div class="task-item">
            <div class="task-content">
              <div class="task-title">${t.title}</div>
              <div style="font-size: 12px; color: rgba(255,255,255,0.5);">${t.status}</div>
            </div>
            <span class="task-priority priority-${t.priority}">${t.priority}</span>
          </div>
        `).join('');
      }
      
      loadCalendar() {
        const grid = document.getElementById('calendar-grid');
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        // Generate calendar days
        let html = '';
        for (let week = 0; week < 5; week++) {
          for (let day = 0; day < 7; day++) {
            const dayNum = week * 7 + day + 1;
            const isToday = dayNum === 14; // March 14
            if (dayNum <= 31) {
              html += `
                <div class="calendar-day ${isToday ? 'today' : ''}">
                  <div class="day-name">${week === 0 ? days[day] : ''}</div>
                  <div class="day-number">${dayNum}</div>
                </div>
              `;
            }
          }
        }
        grid.innerHTML = html;
      }
      
      loadTeam() {
        const team = [
          { name: 'Nano', role: 'Coordinator', status: 'online', emoji: '🔬' },
          { name: 'Frontend Developer', role: 'UI/UX', status: 'online', emoji: '🎨' },
          { name: 'Backend Developer', role: 'Server-side', status: 'online', emoji: '⚙️' },
          { name: 'AI Engineer', role: 'ML & Automation', status: 'online', emoji: '🤖' },
          { name: 'Database Engineer', role: 'Data & Storage', status: 'online', emoji: '🗄️' },
          { name: 'Integration Specialist', role: 'APIs & Connections', status: 'online', emoji: '🔌' },
          { name: 'Researcher', role: 'Investigation', status: 'online', emoji: '🔍' },
          { name: 'Reviewer', role: 'Code Review', status: 'online', emoji: '👁️' },
          { name: 'Coder', role: 'General Coding', status: 'online', emoji: '💻' }
        ];
        
        const grid = document.getElementById('team-grid');
        grid.innerHTML = team.map(member => `
          <div class="team-card">
            <div class="team-avatar">${member.emoji}</div>
            <div class="team-name">${member.name}</div>
            <div class="team-role">${member.role}</div>
            <div class="team-status online">
              <span class="status-dot"></span>
              ${member.status}
            </div>
          </div>
        `).join('');
      }
      
      renderFallback() {
        this.renderProjects([]);
      }
    }
    
    // Initialize
    window.mcApp = new MissionControlApp();
  </script>
</body>
</html>
