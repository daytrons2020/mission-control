<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Tracker - Real-Time Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #888;
            margin-top: 10px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .card-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 10px;
        }
        
        .card-value {
            font-size: 2.5rem;
            font-weight: 600;
        }
        
        .card-budget { border-left: 4px solid #4CAF50; }
        .card-spent { border-left: 4px solid #f44336; }
        .card-remaining { border-left: 4px solid #2196F3; }
        
        .projects-section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .project-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .project-name {
            font-size: 1.3rem;
            font-weight: 500;
        }
        
        .project-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .status-good { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .status-warning { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .status-danger { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        .status-critical { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }
        
        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .progress-good { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
        .progress-warning { background: linear-gradient(90deg, #FFC107, #FF9800); }
        .progress-danger { background: linear-gradient(90deg, #f44336, #FF5722); }
        .progress-critical { background: linear-gradient(90deg, #9C27B0, #E91E63); }
        
        .project-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }
        
        .alerts-section {
            margin-bottom: 40px;
        }
        
        .alert {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .alert-icon {
            font-size: 2rem;
        }
        
        .alert-content h3 {
            margin-bottom: 5px;
        }
        
        .alert-content p {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 40px;
        }
        
        .refresh-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-left: 10px;
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4CAF50;
            font-size: 0.85rem;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Cost Tracker</h1>
            <p class="subtitle">
                <span class="live-indicator">
                    <span class="live-dot"></span>
                    Live Dashboard
                </span>
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
            </p>
        </header>
        
        <div class="summary-cards" id="summaryCards">
            <!-- Populated by JS -->
        </div>
        
        <div class="alerts-section" id="alertsSection">
            <!-- Populated by JS -->
        </div>
        
        <div class="projects-section">
            <h2 class="section-title">📁 Projects</h2>
            <div id="projectsList">
                <!-- Populated by JS -->
            </div>
        </div>
        
        <p class="last-updated" id="lastUpdated">Last updated: Never</p>
    </div>
    
    <script>
        // Sample data structure - will be replaced by actual data loading
        let costData = {
            projects: {}
        };
        
        function loadData() {
            // In a real implementation, this would fetch from the data file
            // For now, we'll check if there's data in localStorage or use empty state
            const stored = localStorage.getItem('costTrackerData');
            if (stored) {
                costData = JSON.parse(stored);
            }
            renderDashboard();
        }
        
        function renderDashboard() {
            renderSummaryCards();
            renderAlerts();
            renderProjects();
            updateTimestamp();
        }
        
        function renderSummaryCards() {
            const projects = Object.values(costData.projects);
            const totalBudget = projects.reduce((sum, p) => sum + p.budget, 0);
            const totalSpent = projects.reduce((sum, p) => sum + p.spent, 0);
            const totalRemaining = totalBudget - totalSpent;
            
            const container = document.getElementById('summaryCards');
            container.innerHTML = `
                <div class="card card-budget">
                    <div class="card-label">Total Budget</div>
                    <div class="card-value">$${totalBudget.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
                <div class="card card-spent">
                    <div class="card-label">Total Spent</div>
                    <div class="card-value">$${totalSpent.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
                <div class="card card-remaining">
                    <div class="card-label">Remaining</div>
                    <div class="card-value">$${totalRemaining.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
            `;
        }
        
        function renderAlerts() {
            const alerts = [];
            
            Object.entries(costData.projects).forEach(([id, project]) => {
                const percentage = (project.spent / project.budget) * 100;
                
                if (percentage >= 100) {
                    alerts.push({
                        icon: '🚨',
                        title: `${project.name} - Budget Exceeded!`,
                        message: `Spent $${project.spent.toFixed(2)} of $${project.budget.toFixed(2)} budget (${percentage.toFixed(1)}%)`
                    });
                } else if (percentage >= 75) {
                    alerts.push({
                        icon: '🔴',
                        title: `${project.name} - 75% Budget Used`,
                        message: `Spent $${project.spent.toFixed(2)} of $${project.budget.toFixed(2)} budget (${percentage.toFixed(1)}%)`
                    });
                } else if (percentage >= 50) {
                    alerts.push({
                        icon: '🟡',
                        title: `${project.name} - 50% Budget Used`,
                        message: `Spent $${project.spent.toFixed(2)} of $${project.budget.toFixed(2)} budget (${percentage.toFixed(1)}%)`
                    });
                }
            });
            
            const container = document.getElementById('alertsSection');
            if (alerts.length === 0) {
                container.innerHTML = '';
            } else {
                container.innerHTML = `
                    <h2 class="section-title">⚠️ Budget Alerts</h2>
                    ${alerts.map(alert => `
                        <div class="alert">
                            <span class="alert-icon">${alert.icon}</span>
                            <div class="alert-content">
                                <h3>${alert.title}</h3>
                                <p>${alert.message}</p>
                            </div>
                        </div>
                    `).join('')}
                `;
            }
        }
        
        function renderProjects() {
            const container = document.getElementById('projectsList');
            const projects = Object.entries(costData.projects);
            
            if (projects.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">No projects yet. Create one to start tracking costs!</p>';
                return;
            }
            
            container.innerHTML = projects.map(([id, project]) => {
                const percentage = (project.spent / project.budget) * 100;
                let statusClass, progressClass, statusText;
                
                if (percentage >= 100) {
                    statusClass = 'status-critical';
                    progressClass = 'progress-critical';
                    statusText = 'Exceeded';
                } else if (percentage >= 75) {
                    statusClass = 'status-danger';
                    progressClass = 'progress-danger';
                    statusText = 'Critical';
                } else if (percentage >= 50) {
                    statusClass = 'status-warning';
                    progressClass = 'progress-warning';
                    statusText = 'Warning';
                } else {
                    statusClass = 'status-good';
                    progressClass = 'progress-good';
                    statusText = 'Good';
                }
                
                const remaining = project.budget - project.spent;
                
                return `
                    <div class="project-card">
                        <div class="project-header">
                            <span class="project-name">${project.name}</span>
                            <span class="project-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar ${progressClass}" style="width: ${Math.min(percentage, 100)}%">
                                ${percentage >= 20 ? percentage.toFixed(1) + '%' : ''}
                            </div>
                        </div>
                        <div class="project-stats">
                            <div class="stat">
                                <div class="stat-value">$${project.budget.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="stat-label">Budget</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">$${project.spent.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="stat-label">Spent</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">$${remaining.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="stat-label">Remaining</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateTimestamp() {
            document.getElementById('lastUpdated').textContent = 
                'Last updated: ' + new Date().toLocaleString();
        }
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
        
        // Initial load
        loadData();
    </script>
</body>
</html>
