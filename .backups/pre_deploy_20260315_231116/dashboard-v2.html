<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <title>Mission Control</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/mobile-first.css">
  <link rel="stylesheet" href="styles/mobile-optimization-v2.css">
  <link rel="stylesheet" href="styles/sidebar-collapsible.css">
  
  <style>
    /* Base styles */
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-sidebar: #141414;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --accent-purple: #8b5cf6;
      --border-subtle: #333333;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      background: var(--bg-sidebar);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
    }
    
    .sidebar-section {
      padding: 8px 0;
    }
    
    .sidebar-section-title {
      padding: 8px 16px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }
    
    /* Main content */
    .main-content {
      padding: 24px;
      min-height: 100vh;
    }
    
    .page-header {
      margin-bottom: 24px;
    }
    
    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
    }
    
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-subtle);
    }
    
    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .main-content {
        padding: 16px;
        padding-top: 80px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay"></div>
  
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-purple)" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="sidebar-text">Mission Control</span>
      </div>
      <button class="sidebar-close" aria-label="Close sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Overview</div>
        <button class="sidebar-item active" data-tooltip="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span class="sidebar-text">Dashboard</span>
        </button>
        <button class="sidebar-item" data-tooltip="Tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
          </svg>
          <span class="sidebar-text">Tasks</span>
        </button>
        <button class="sidebar-item" data-tooltip="Agents">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 00-3-3.87"></path>
            <path d="M16 3.13a4 4 0 010 7.75"></path>
          </svg>
          <span class="sidebar-text">Agents</span>
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-title">Projects</div>
        <button class="sidebar-item" data-tooltip="Trading System">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path>
          </svg>
          <span class="sidebar-text">Trading System</span>
        </button>
        <button class="sidebar-item" data-tooltip="Research">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <span class="sidebar-text">Research</span>
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-title">System</div>
        <button class="sidebar-item" data-tooltip="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path>
          </svg>
          <span class="sidebar-text">Settings</span>
        </button>
      </div>
    </nav>
  </aside>
  
  <!-- Sidebar Toggle Button -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>
  
  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <header class="page-header">
      <h1>Dashboard</h1>
      <p style="color: var(--text-secondary); margin-top: 4px;">Mission Control Overview</p>
    </header>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Active Tasks</div>
        <div class="stat-value" style="color: var(--accent-purple);">3</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Agents</div>
        <div class="stat-value">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Token Usage</div>
        <div class="stat-value" style="color: #22c55e;">$0.00</div>
      </div>
    </div>
    
    <section style="background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border-subtle);">
      <h2 style="font-size: 18px; margin-bottom: 16px;">Recent Activity</h2>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-primary); border-radius: 8px;">
          <span style="color: #22c55e;">●</span>
          <span>Ollama integration complete</span>
          <span style="margin-left: auto; color: var(--text-secondary); font-size: 12px;">2m ago</span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-primary); border-radius: 8px;">
          <span style="color: var(--accent-purple);">●</span>
          <span>Mobile dashboard deployed</span>
          <span style="margin-left: auto; color: var(--text-secondary); font-size: 12px;">5m ago</span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-primary); border-radius: 8px;">
          <span style="color: #3b82f6;">●</span>
          <span>Error recovery system active</span>
          <span style="margin-left: auto; color: var(--text-secondary); font-size: 12px;">10m ago</span>
        </div>
      </div>
    </section>
  </main>
  
  <script src="scripts/sidebar-controller.js"></script>
</body>
</html>
