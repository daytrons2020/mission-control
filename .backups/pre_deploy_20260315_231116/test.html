<!DOCTYPE html>
<html>
<head>
  <title>Test - Mission Control</title>
  <style>
    body { background: #0a0a0e; color: white; font-family: Arial; padding: 50px; }
    button { padding: 20px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Button Test</h1>
  <button id="test-btn">CLICK ME</button>
  <p id="result">Not clicked yet</p>
  
  <script>
    // Direct inline script - no external files
    document.getElementById('test-btn').onclick = function() {
      document.getElementById('result').textContent = 'BUTTON WORKS! ' + new Date().toLocaleTimeString();
      alert('Success! JavaScript is working.');
    };
    console.log('Test page loaded');
  </script>
</body>
</html>
