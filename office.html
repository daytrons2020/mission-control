<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control - Digital Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(15, 15, 20, 0.7);
      --glass-bg-light: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-purple: #8b5cf6;
      --accent-cyan: #00f5ff;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --accent-pink: #ec4899;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0e 0%, #1a1a2e 50%, #0a0a0e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 80px 24px 24px;
      overflow-x: hidden;
    }
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 10% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(0, 245, 255, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 28px; font-weight: 700; }
    .header-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    
    /* Status Bar */
    .status-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
    .dot-busy { background: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }
    
    /* Workstations Grid */
    .workstations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .workspace {
      background: linear-gradient(145deg, rgba(20,20,30,0.8), rgba(15,15,25,0.9));
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      transition: all 0.3s;
    }
    .workspace:hover {
      border-color: var(--accent-purple);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .workspace.active {
      border-color: var(--accent-green);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
    }
    
    /* Agent Profile */
    .workspace-profile {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .agent-avatar {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .agent-status {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid #0a0a0e;
    }
    .agent-status.online { background: var(--accent-green); }
    .agent-status.busy { background: var(--accent-yellow); }
    
    .agent-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .agent-role { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    .agent-status-text {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-green);
    }
    
    /* Computer Screen */
    .computer-setup {
      background: linear-gradient(180deg, #1a1a2e, #0f0f1a);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .monitor {
      background: #000;
      border: 2px solid #2a2a3e;
      border-radius: 12px;
      aspect-ratio: 16/10;
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .screen-content {
      position: absolute;
      inset: 8px;
      background: linear-gradient(180deg, rgba(139, 92, 246, 0.05), rgba(0,0,0,0.9));
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      display: flex;
      flex-direction: column;
    }
    .code-line { margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .code-line .prompt { color: var(--accent-green); }
    .code-line .command { color: var(--accent-cyan); }
    .typing-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent-cyan);
      animation: blink 1s infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    
    .progress-section { margin-top: auto; }
    .progress-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
      border-radius: 2px;
      transition: width 0.5s;
    }
    
    /* Stats */
    .workspace-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-item {
      background: var(--glass-bg-light);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--accent-cyan); }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 4px; }
    
    /* Current Task */
    .current-task {
      background: var(--glass-bg-light);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      border-left: 3px solid var(--accent-green);
    }
    .task-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 4px; }
    .task-name { font-size: 13px; font-weight: 500; }
    
    @media (max-width: 768px) {
      .workstations-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <div class="header">
    <div>
      <h1>🏢 Digital Office</h1>
      <div class="header-subtitle">Real-time view of all team members at work</div>
    </div>
  </div>
  
  <div class="status-bar">
    <div class="status-pill">
      <span class="status-dot dot-online"></span>
      <span id="working-count">7 Working</span>
    </div>
    <div class="status-pill">
      <span class="status-dot dot-busy"></span>
      <span id="busy-count">3 Busy</span>
    </div>
    <div class="status-pill">
      <span class="status-dot" style="background: rgba(255,255,255,0.3);"></span>
      <span id="standby-count">4 Standby</span>
    </div>
  </div>
  
  <div class="workstations-grid" id="workstations">
    <!-- Workstations will be populated by JavaScript -->
  </div>

  <script>
    // Agent Data
    const agents = [
      {
        name: 'Kimi (Lead AI)',
        role: 'Lead AI Orchestrator',
        avatar: '🎯',
        gradient: 'linear-gradient(135deg, #8b5cf6, #ec4899)',
        status: 'online',
        statusText: 'Managing Team',
        screen: [
          { type: 'prompt', text: '>' },
          { type: 'command', text: 'orchestrate --all' },
          { text: 'Coordinating 14 active agents...' },
          { text: 'Task queue: 24 pending' }
        ],
        progress: 78,
        progressLabel: 'System Load',
        stats: { tasks: 156, hours: '6.2h', efficiency: '98%' },
        task: 'Managing Mission Control Operations'
      },
      {
        name: 'Nano',
        role: 'Mission Control Coordinator',
        avatar: '🤖',
        gradient: 'linear-gradient(135deg, #6366f1, #8b5cf6)',
        status: 'online',
        statusText: 'Coordinating Tasks',
        screen: [
          { type: 'prompt', text: '>' },
          { type: 'command', text: 'task list --priority=high' },
          { text: 'Analyzing task dependencies...' },
          { text: 'Assigning to appropriate agents...' }
        ],
        progress: 65,
        progressLabel: 'Queue Processing',
        stats: { tasks: 24, hours: '4.1h', efficiency: '96%' },
        task: 'Prioritizing and routing tasks'
      },
      {
        name: 'Frontend Developer',
        role: 'UI/UX Specialist',
        avatar: '🎨',
        gradient: 'linear-gradient(135deg, #ec4899, #f472b6)',
        status: 'busy',
        statusText: 'Coding Interface',
        screen: [
          { type: 'prompt', text: '>' },
          { type: 'command', text: 'npm run dev' },
          { text: 'Building workspace components...' },
          { text: 'Compiling tailwind styles...' }
        ],
        progress: 82,
        progressLabel: 'Build Progress',
        stats: { tasks: 12, hours: '3.5h', efficiency: '94%' },
        task: 'Building Digital Office interface'
      },
      {
        name: 'Backend Developer',
        role: 'API Architect',
        avatar: '⚙️',
        gradient: 'linear-gradient(135deg, #f59e0b, #fbbf24)',
        status: 'busy',
        statusText: 'Optimizing APIs',
        screen: [
          { type: 'prompt', text: '>' },
          { type: 'command', text: 'python manage.py migrate' },
          { text: 'Applying database migrations...' },
          { text: 'Optimizing query performance...' }
        ],
        progress: 45,
        progressLabel: 'Migration Progress',
        stats: { tasks: 8, hours: '2.8h', efficiency: '92%' },
        task: 'Database optimization'
      },
      {
        name: 'Database Engineer',
        role: 'Data Specialist',
        avatar: '🗄️',
        gradient: 'linear-gradient(135deg, #10b981, #34d399)',
        status: 'online',
        statusText: 'Indexing Data',
        screen: [
          { type: 'prompt', text: '>' },
          { type: 'command', text: 'VACUUM ANALYZE' },
          { text: 'Indexing memory vectors...' },
          { text: 'Rows processed: 47,832' }
        ],
        progress: 91,
        progressLabel: 'Indexing',
        stats: { tasks: 15, hours: '5.2h', efficiency: '97%' },
        task: 'Memory search optimization'
      },
      {
        name: 'AI Engineer',
        role: 'Model Optimization',
        avatar: '🧠',
        gradient: 'linear-gradient(135deg, #06b6d4, #22d3ee)',
        status: 'busy',
        statusText: 'Training Model',
        screen: [
          { type: 'prompt', text: '>' },
          { type: 'command', text: 'train --model=cost-optimizer' },
          { text: 'Epoch 47/100' },
          { text: 'Loss: 0.0234 | Accuracy: 94.2%' }
        ],
        progress: 47,
        progressLabel: 'Training Epoch',
        stats: { tasks: 6, hours: '4.5h', efficiency: '95%' },
        task: 'Training cost optimization model'
      }
    ];

    function renderWorkstations() {
      const container = document.getElementById('workstations');
      container.innerHTML = agents.map(agent => `
        <div class="workspace ${agent.status === 'working' || agent.status === 'busy' ? 'active' : ''}">
          <div class="workspace-profile">
            <div class="agent-avatar" style="background: ${agent.gradient};">
              ${agent.avatar}
              <span class="agent-status ${agent.status}"></span>
            </div>
            <div class="agent-info">
              <h3>${agent.name}</h3>
              <div class="agent-role">${agent.role}</div>
              <div class="agent-status-text">
                <span style="width: 8px; height: 8px; border-radius: 50%; background: ${agent.status === 'online' ? '#10b981' : '#f59e0b'};"></span>
                ${agent.statusText}
              </div>
            </div>
          </div>
          
          <div class="computer-setup">
            <div class="monitor">
              <div class="screen-content">
                ${agent.screen.map(line => `
                  <div class="code-line">
                    ${line.type === 'prompt' ? '<span class="prompt">' + line.text + '</span>' : 
                      line.type === 'command' ? '<span class="prompt">></span> <span class="command">' + line.text + '</span>' : 
                      line.text}
                    ${line === agent.screen[agent.screen.length - 1] ? '<span class="typing-cursor"></span>' : ''}
                  </div>
                `).join('')}
                <div class="progress-section">
                  <div class="progress-label">
                    <span>${agent.progressLabel}</span>
                    <span>${agent.progress}%</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: ${agent.progress}%;"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="workspace-stats">
            <div class="stat-item">
              <div class="stat-value">${agent.stats.tasks}</div>
              <div class="stat-label">Tasks</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${agent.stats.hours}</div>
              <div class="stat-label">Active</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${agent.stats.efficiency}</div>
              <div class="stat-label">Efficiency</div>
            </div>
          </div>
          
          <div class="current-task">
            <div class="task-label">Current Task</div>
            <div class="task-name">${agent.task}</div>
          </div>
        </div>
      `).join('');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      console.log('[Digital Office] Loading...');
      renderWorkstations();
      console.log('[Digital Office] Loaded with ' + agents.length + ' workstations');
    });
  </script>
</body>
</html>
