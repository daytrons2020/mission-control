<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control - Memory Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(15, 15, 20, 0.6);
      --glass-bg-light: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-purple: #8b5cf6;
      --accent-cyan: #00f5ff;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0e;
      color: #fff;
      min-height: 100vh;
    }
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 245, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    /* Navigation */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(15, 15, 20, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link {
      padding: 10px 16px;
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--glass-bg-light);
      color: #fff;
    }
    .nav-link.active {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
    }
    
    /* Main Layout */
    .main-container {
      display: flex;
      padding-top: 60px;
      min-height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      padding: 24px;
      position: fixed;
      top: 60px;
      bottom: 0;
      left: 0;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .filter-group {
      margin-bottom: 24px;
    }
    .filter-label {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      display: block;
    }
    .filter-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .filter-option:hover {
      background: var(--glass-bg-light);
    }
    .filter-option.active {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
    }
    .filter-count {
      margin-left: auto;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      background: var(--glass-bg-light);
      padding: 2px 8px;
      border-radius: 12px;
    }
    
    /* Content Area */
    .content {
      flex: 1;
      margin-left: 280px;
      padding: 32px;
    }
    
    /* Header */
    .page-header {
      margin-bottom: 32px;
    }
    .page-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .page-subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    
    /* Search Bar */
    .search-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .search-input-wrapper {
      flex: 1;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 18px;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 48px;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent-purple);
    }
    .search-input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .view-toggle {
      display: flex;
      gap: 8px;
    }
    .view-btn {
      padding: 10px 16px;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .view-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
    }
    .view-btn.active {
      background: rgba(139, 92, 246, 0.3);
      color: var(--accent-purple);
      border-color: var(--accent-purple);
    }
    
    /* Results Info */
    .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    
    /* Document Grid */
    .documents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
    }
    .documents-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    /* Document Card */
    .doc-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .doc-card:hover {
      border-color: var(--accent-purple);
      transform: translateY(-2px);
    }
    .doc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .doc-title {
      font-weight: 600;
      font-size: 16px;
      line-height: 1.4;
      flex: 1;
    }
    .doc-category {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
      margin-left: 12px;
    }
    .doc-preview {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .doc-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .doc-tags {
      display: flex;
      gap: 6px;
    }
    .doc-tag {
      background: var(--glass-bg-light);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    mark {
      background: rgba(139, 92, 246, 0.4);
      color: #fff;
      padding: 1px 3px;
      border-radius: 3px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.5);
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .empty-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    
    /* Document Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 40px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--glass-border);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover {
      background: var(--accent-red);
      border-color: var(--accent-red);
    }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-nav {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid var(--glass-border);
    }
    .modal-nav-btn {
      padding: 10px 20px;
      background: var(--glass-bg-light);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .modal-nav-btn:hover:not(:disabled) {
      background: var(--accent-purple);
      border-color: var(--accent-purple);
    }
    .modal-nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    /* Markdown Styles */
    .markdown-content h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--accent-cyan);
    }
    .markdown-content h2 {
      font-size: 22px;
      font-weight: 600;
      margin: 24px 0 12px;
      color: var(--accent-purple);
    }
    .markdown-content h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 20px 0 10px;
    }
    .markdown-content p {
      margin-bottom: 12px;
      line-height: 1.7;
    }
    .markdown-content ul, .markdown-content ol {
      margin-bottom: 12px;
      padding-left: 24px;
    }
    .markdown-content li {
      margin-bottom: 6px;
    }
    .markdown-content code {
      background: rgba(139, 92, 246, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 14px;
    }
    .markdown-content pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .markdown-content pre code {
      background: none;
      padding: 0;
    }
    .markdown-content blockquote {
      border-left: 3px solid var(--accent-purple);
      padding-left: 16px;
      margin: 16px 0;
      color: rgba(255,255,255,0.8);
    }
    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    .markdown-content th, .markdown-content td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid var(--glass-border);
    }
    .markdown-content th {
      font-weight: 600;
      color: var(--accent-cyan);
    }
    
    /* Loading State */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--glass-border);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
      .content {
        margin-left: 0;
        padding: 20px;
      }
      .documents-grid {
        grid-template-columns: 1fr;
      }
      .search-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <!-- Navigation -->
  <nav class="nav-bar">
    <div class="nav-brand">
      <span>🧠</span>
      <span>Memory Archive</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="memory.html" class="nav-link active">Memory</a>
      <a href="task-board.html" class="nav-link">Tasks</a>
      <a href="team.html" class="nav-link">Team</a>
    </div>
  </nav>

  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">Filters</div>
      
      <div class="filter-group">
        <span class="filter-label">Category</span>
        <div class="filter-option active" data-category="all">
          <span>📁</span> All Documents
          <span class="filter-count" id="count-all">0</span>
        </div>
        <div class="filter-option" data-category="curated">
          <span>⭐</span> Curated
          <span class="filter-count" id="count-curated">0</span>
        </div>
        <div class="filter-option" data-category="daily">
          <span>📅</span> Daily Logs
          <span class="filter-count" id="count-daily">0</span>
        </div>
      </div>
      
      <div class="filter-group">
        <span class="filter-label">Tags</span>
        <div id="tags-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

    <!-- Content -->
    <main class="content">
      <div class="page-header">
        <h1 class="page-title">Memory Archive</h1>
        <p class="page-subtitle">Search through all memories, daily logs, and curated knowledge</p>
      </div>

      <!-- Search -->
      <div class="search-container">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-input" placeholder="Search memories...">
        </div>
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid">⊞ Grid</button>
          <button class="view-btn" data-view="list">☰ List</button>
        </div>
      </div>

      <!-- Results Info -->
      <div class="results-info">
        <span id="results-count">Loading memories...</span>
        <span id="last-updated"></span>
      </div>

      <!-- Documents Container -->
      <div id="documents-container">
        <div class="loading-container">
          <div class="loading-spinner"></div>
          <p>Loading memories from GitHub...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Document Modal -->
  <div class="modal-overlay" id="document-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Document Title</h2>
        <button class="modal-close" onclick="memoryApp.closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="markdown-content" id="modal-content">
          <!-- Content loaded here -->
        </div>
      </div>
      <div class="modal-nav">
        <button class="modal-nav-btn" id="modal-prev" onclick="memoryApp.prevDocument()">← Previous</button>
        <button class="modal-nav-btn" id="modal-next" onclick="memoryApp.nextDocument()">Next →</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="services/memoryService.js"></script>
  <script>
    class MemoryApp {
      constructor() {
        this.currentView = 'grid';
        this.currentCategory = 'all';
        this.currentSearch = '';
        this.filteredDocs = [];
        this.currentDocIndex = 0;
        this.init();
      }

      async init() {
        this.setupEventListeners();
        await this.loadDocuments();
      }

      setupEventListeners() {
        // Search
        document.getElementById('search-input').addEventListener('input', (e) => {
          this.currentSearch = e.target.value;
          this.filterAndRender();
        });

        // View toggle
        document.querySelectorAll('.view-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.currentView = btn.dataset.view;
            this.renderDocuments();
          });
        });

        // Category filters
        document.querySelectorAll('.filter-option[data-category]').forEach(option => {
          option.addEventListener('click', () => {
            document.querySelectorAll('.filter-option[data-category]').forEach(o => o.classList.remove('active'));
            option.classList.add('active');
            this.currentCategory = option.dataset.category;
            this.filterAndRender();
          });
        });

        // Close modal on overlay click
        document.getElementById('document-modal').addEventListener('click', (e) => {
          if (e.target.id === 'document-modal') this.closeModal();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') this.closeModal();
          if (e.key === 'ArrowLeft' && document.getElementById('document-modal').classList.contains('active')) {
            this.prevDocument();
          }
          if (e.key === 'ArrowRight' && document.getElementById('document-modal').classList.contains('active')) {
            this.nextDocument();
          }
        });
      }

      async loadDocuments() {
        await window.memoryService.init();
        this.filterAndRender();
        this.updateFilterCounts();
        this.renderTags();
      }

      filterAndRender() {
        let docs = window.memoryService.documents;

        // Filter by category
        if (this.currentCategory !== 'all') {
          docs = docs.filter(doc => doc.category === this.currentCategory);
        }

        // Filter by search
        if (this.currentSearch) {
          docs = window.memoryService.search(this.currentSearch);
        }

        // Sort by date (newest first)
        docs = window.memoryService.sort(docs, 'date-desc');

        this.filteredDocs = docs;
        this.renderDocuments();
        this.updateResultsInfo();
      }

      renderDocuments() {
        const container = document.getElementById('documents-container');
        
        if (this.filteredDocs.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🔍</div>
              <div class="empty-title">No memories found</div>
              <p>Try adjusting your search or filters</p>
            </div>
          `;
          return;
        }

        container.className = this.currentView === 'grid' ? 'documents-grid' : 'documents-list';
        
        container.innerHTML = this.filteredDocs.map((doc, index) => `
          <div class="doc-card" onclick="memoryApp.openDocument(${index})">
            <div class="doc-header">
              <div class="doc-title">${doc.title}</div>
              <span class="doc-category">${doc.category}</span>
            </div>
            <div class="doc-preview">${doc.highlightedPreview || doc.preview}</div>
            <div class="doc-meta">
              <span>📅 ${this.formatDate(doc.date)}</span>
              <div class="doc-tags">
                ${doc.tags.slice(0, 3).map(tag => `<span class="doc-tag">${tag}</span>`).join('')}
              </div>
            </div>
          </div>
        `).join('');
      }

      renderTags() {
        const tags = window.memoryService.getAllTags();
        const container = document.getElementById('tags-list');
        
        container.innerHTML = tags.map(tag => `
          <div class="filter-option" data-tag="${tag}">
            <span>🏷️</span> ${tag}
          </div>
        `).join('');

        // Add tag click handlers
        container.querySelectorAll('.filter-option').forEach(option => {
          option.addEventListener('click', () => {
            document.getElementById('search-input').value = option.dataset.tag;
            this.currentSearch = option.dataset.tag;
            this.filterAndRender();
          });
        });
      }

      updateFilterCounts() {
        const docs = window.memoryService.documents;
        document.getElementById('count-all').textContent = docs.length;
        document.getElementById('count-curated').textContent = docs.filter(d => d.category === 'curated').length;
        document.getElementById('count-daily').textContent = docs.filter(d => d.category === 'daily').length;
      }

      updateResultsInfo() {
        const total = window.memoryService.documents.length;
        const showing = this.filteredDocs.length;
        
        document.getElementById('results-count').textContent = 
          showing === total ? `Showing all ${total} memories` : `Showing ${showing} of ${total} memories`;
        
        const lastUpdated = window.memoryService.getCachedData() ? 
          new Date().toLocaleDateString() : 'Not cached';
        document.getElementById('last-updated').textContent = `Updated: ${lastUpdated}`;
      }

      openDocument(index) {
        this.currentDocIndex = index;
        const doc = this.filteredDocs[index];
        
        document.getElementById('modal-title').textContent = doc.title;
        document.getElementById('modal-content').innerHTML = this.renderMarkdown(doc.content);
        document.getElementById('document-modal').classList.add('active');
        
        this.updateModalNav();
      }

      closeModal() {
        document.getElementById('document-modal').classList.remove('active');
      }

      prevDocument() {
        if (this.currentDocIndex > 0) {
          this.openDocument(this.currentDocIndex - 1);
        }
      }

      nextDocument() {
        if (this.currentDocIndex < this.filteredDocs.length - 1) {
          this.openDocument(this.currentDocIndex + 1);
        }
      }

      updateModalNav() {
        document.getElementById('modal-prev').disabled = this.currentDocIndex === 0;
        document.getElementById('modal-next').disabled = this.currentDocIndex === this.filteredDocs.length - 1;
      }

      renderMarkdown(content) {
        // Simple markdown to HTML conversion
        return content
          .replace(/^# (.+)$/gm, '<h1>$1</h1>')
          .replace(/^## (.+)$/gm, '<h2>$1</h2>')
          .replace(/^### (.+)$/gm, '<h3>$1</h3>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`{3}[\s\S]*?`{3}/g, match => `<pre><code>${match.slice(3, -3)}</code></pre>`)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/^- (.+)$/gm, '<li>$1</li>')
          .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
          .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
          .replace(/(<li>.+<\/li>\n?)+/g, '<ol>$&</ol>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
          .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
          .replace(/\n\n/g, '</p><p>')
          .replace(/^(.+)$/gm, '<p>$1</p>')
          .replace(/<p><\/p>/g, '');
      }

      formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { 
          month: 'short', 
          day: 'numeric', 
          year: 'numeric' 
        });
      }
    }

    // Initialize
    window.memoryApp = new MemoryApp();
  </script>
</body>
