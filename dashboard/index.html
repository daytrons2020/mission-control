<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - Smart Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <h1>Mission Control</h1>
            </div>
            <nav class="nav-tabs">
                <button class="nav-tab active" data-view="calendar">Calendar</button>
                <button class="nav-tab" data-view="tasks">Tasks</button>
                <button class="nav-tab" data-view="agents">Agents</button>
            </nav>
            <div class="header-actions">
                <button class="btn-glass" id="btn-today">Today</button>
                <button class="btn-primary" id="btn-new-event">+ New Event</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Calendar View -->
            <div class="view active" id="calendar-view">
                <div class="calendar-container glass-panel">
                    <!-- Calendar Header -->
                    <div class="calendar-header">
                        <button class="nav-btn" id="prev-month">‹</button>
                        <h2 class="month-year" id="month-year">March 2026</h2>
                        <button class="nav-btn" id="next-month">›</button>
                    </div>

                    <!-- Weekday Headers -->
                    <div class="weekdays">
                        <div class="weekday">Sun</div>
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                    </div>

                    <!-- Calendar Grid -->
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Days will be generated by JS -->
                    </div>
                </div>

                <!-- Side Panel -->
                <aside class="side-panel glass-panel">
                    <!-- Selected Day Details -->
                    <div class="day-details" id="day-details">
                        <div class="day-header">
                            <h3 id="selected-date">Select a date</h3>
                            <span class="day-events-count" id="day-events-count"></span>
                        </div>
                        <div class="events-list" id="day-events-list">
                            <p class="empty-state">Click on a day to view events</p>
                        </div>
                    </div>

                    <!-- Agent Work Sessions -->
                    <div class="agent-sessions">
                        <h3>🤖 Agent Sessions</h3>
                        <div class="sessions-list" id="sessions-list">
                            <!-- Sessions populated by JS -->
                        </div>
                    </div>
                </aside>
            </div>

            <!-- Tasks View -->
            <div class="view" id="tasks-view">
                <div class="tasks-container glass-panel">
                    <h2>Scheduled Tasks</h2>
                    <div class="tasks-list" id="tasks-list">
                        <!-- Tasks populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Agents View -->
            <div class="view" id="agents-view">
                <div class="agents-container glass-panel">
                    <h2>Active Agent Sessions</h2>
                    <div class="agents-grid" id="agents-grid">
                        <!-- Agents populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Event Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">New Event</h3>
                <button class="close-btn" id="close-modal">×</button>
            </div>
            <form class="event-form" id="event-form">
                <div class="form-group">
                    <label for="event-title">Title</label>
                    <input type="text" id="event-title" placeholder="Event title" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="event-date">Date</label>
                        <input type="date" id="event-date" required>
                    </div>
                    <div class="form-group">
                        <label for="event-time">Time</label>
                        <input type="time" id="event-time">
                    </div>
                </div>
                <div class="form-group">
                    <label for="event-type">Type</label>
                    <select id="event-type">
                        <option value="task">Task</option>
                        <option value="meeting">Meeting</option>
                        <option value="agent">Agent Session</option>
                        <option value="reminder">Reminder</option>
                        <option value="deadline">Deadline</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="event-description">Description</label>
                    <textarea id="event-description" rows="3" placeholder="Add details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="event-project">Project</label>
                    <select id="event-project">
                        <option value="">No Project</option>
                        <option value="respiratory-education">Respiratory Education</option>
                        <option value="rt-scheduling">RT Scheduling</option>
                        <option value="trading-system">Trading System</option>
                        <option value="respiratory-tools">Respiratory Tools</option>
                        <option value="reselling">Reselling Business</option>
                        <option value="youtube">YouTube Empire</option>
                        <option value="kids-app">Kids App</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancel-event">Cancel</button>
                    <button type="submit" class="btn-primary">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
